{% set name = "helios" %}
{% set version = "3.0.0a0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: helios-{{ version }}.tar.gz
  url: https://github.com/3dgeo-heidelberg/helios/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d98c8db2052e8c50831e11c5851f80d2b4c1178fe986d27fe658ea315af52c78

build:
  entry_points:
    - helios = helios.__main__:cli
  # NB: The -D_LIBCPP_DISABLE_AVAILABILITY flag originates from https://conda-forge.org/docs/maintainer/knowledge_base/#newer-c-features-with-old-sdk
  #     It will become obsolete once the conda infrastructure upgrades to 10.15 MacOS SDK.
  script: {{ PYTHON }} -m pip install . --no-deps --config-settings=cmake.define.BUILD_TESTING="OFF" --config-settings=cmake.define.CMAKE_CXX_FLAGS="-D_LIBCPP_DISABLE_AVAILABILITY" -vv
  script_env:
    # GitHub provided tarballs do not contain the metadata required by setuptools_scm.
    # We therefore manually inject the (known) version number into the build environment.
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - make
  host:
    - armadillo
    - cereal
    - glm <1.0
    - lastools
    - libblas
    - liblapack
    - libboost-devel
    - libgdal
    - pip
    - pybind11
    - python
    - scikit-build-core
    - setuptools_scm
    - tinyxml2
    - zlib
  run:
    - backports.strenum
    - click
    - click-option-group
    - importlib_resources
    - laspy
    - lastools >=2.0.4
    - libgdal
    - matplotlib-base
    - numpydantic
    - pint
    - pydantic
    - python
    - xmlschema

test:
  imports:
    - helios
  requires:
    - pip
  commands:
    - pip check
    - helios --help

about:
  home: https://github.com/3dgeo-heidelberg/helios
  summary: 'Heidelberg LiDAR Operations Simulator ++'
  description: |
    HELIOS++ is a general-purpose software package for simulation of terrestrial,
    mobile and airborne laser scanning surveys written in C++11. It is developed
    and maintained by the 3DGeo Research Group at Heidelberg University.
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - dokempf
    - lwiniwar
    - bhoefle-3dgeo
    - han16nah
